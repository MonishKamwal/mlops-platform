name: CI

on:
  pull_request:
    branches: [develop, staging, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            ruff mypy pytest \
            pandas numpy scikit-learn \
            mlflow xgboost lightgbm \
            fastapi uvicorn pydantic \
            prometheus-fastapi-instrumentator \
            httpx

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy serving/ --ignore-missing-imports

      - name: Unit tests
        run: pytest models/ serving/ -v --tb=short

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          check() { echo "$CHANGED" | grep -q "^$1/" && echo "true" || echo "false"; }
          echo "serving=$(check serving)" >> $GITHUB_OUTPUT
          echo "fraud=$(check models/fraud-detection)" >> $GITHUB_OUTPUT
          echo "sentiment=$(check models/sentiment-analysis)" >> $GITHUB_OUTPUT
          echo "forecast=$(check models/demand-forecasting)" >> $GITHUB_OUTPUT

      - name: Build serving
        if: steps.changes.outputs.serving == 'true'
        run: docker build serving --tag smoke-check-serving:latest

      - name: Build fraud-detection
        if: steps.changes.outputs.fraud == 'true'
        run: docker build models/fraud-detection --tag smoke-check-fraud:latest

      - name: Build sentiment-analysis
        if: steps.changes.outputs.sentiment == 'true'
        run: docker build models/sentiment-analysis --tag smoke-check-sentiment:latest

      - name: Build demand-forecasting
        if: steps.changes.outputs.forecast == 'true'
        run: docker build models/demand-forecasting --tag smoke-check-forecast:latest
