services:
  api:
    build: ./serving
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      FRAUD_MODEL_DIR: /models/fraud-detection/model
      # TODO: set FRAUD_MODEL_URI to the MLflow registry URI once MLflow is deployed on AKS (Phase 2)
      FRAUD_MODEL_URI: ${FRAUD_MODEL_URI:-}
      SENTIMENT_MODEL_URI: ${SENTIMENT_MODEL_URI:-}
      FORECAST_MODEL_URI: ${FORECAST_MODEL_URI:-}
    volumes:
      - ./models/fraud-detection/model:/models/fraud-detection/model:ro
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - mlops
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - mlops
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - mlops
    restart: unless-stopped

networks:
  mlops:
    driver: bridge

volumes:
  mlflow_data:
  prometheus_data:
  grafana_data:
