apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-serving
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-serving
  template:
    metadata:
      labels:
        app: fraud-serving
    spec:
      containers:
        - name: fraud-serving
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8000
          env:
            - name: FRAUD_MODEL_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: fraud-model-uri
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: tracking-uri
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
      imagePullSecrets:
        - name: ghcr-pull
